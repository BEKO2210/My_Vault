<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Layer gradients -->
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#da3633"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow4"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow3"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow1"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

    <!-- Pulse animation for the active data flow -->
    <filter id="pulse">
      <feGaussianBlur stdDeviation="2">
        <animate attributeName="stdDeviation" values="2;4;2" dur="2s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="620" height="520" rx="12" fill="url(#bg)"/>
  <rect width="620" height="520" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="310" y="38" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="600">Memory Architecture</text>
  <text x="310" y="56" text-anchor="middle" fill="#8b949e" font-size="12">Four-layer persistent context system</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 4: Project-Specific Memory               -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>

    <!-- Card -->
    <rect x="40" y="78" width="540" height="90" rx="8" fill="#1a1a2e" stroke="url(#layer4)" stroke-width="1.5"/>

    <!-- Left accent bar -->
    <rect x="40" y="78" width="5" height="90" rx="2.5" fill="url(#layer4)"/>

    <!-- Layer number badge -->
    <circle cx="72" cy="103" r="14" fill="#da3633" opacity="0.15"/>
    <text x="72" y="108" text-anchor="middle" fill="#f85149" font-size="14" font-weight="700">4</text>

    <!-- Title + Description -->
    <text x="96" y="104" fill="#f85149" font-size="14" font-weight="600">Project-Specific Memory</text>
    <text x="96" y="123" fill="#8b949e" font-size="11.5">.claude/memory/project-{name}.md</text>
    <text x="96" y="143" fill="#c9d1d9" font-size="12">Per-project state, decisions, blockers, next actions</text>

    <!-- Status indicator (pulsing dot) -->
    <circle cx="555" cy="123" r="5" fill="#f85149" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="555" cy="123" r="2.5" fill="#f85149"/>
    <text x="540" y="143" text-anchor="end" fill="#484f58" font-size="10">per project</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 3: Long-term Summary Memory              -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze"/>

    <rect x="40" y="180" width="540" height="90" rx="8" fill="#1a1a2e" stroke="url(#layer3)" stroke-width="1.5"/>
    <rect x="40" y="180" width="5" height="90" rx="2.5" fill="url(#layer3)"/>

    <circle cx="72" cy="205" r="14" fill="#d29922" opacity="0.15"/>
    <text x="72" y="210" text-anchor="middle" fill="#e3b341" font-size="14" font-weight="700">3</text>

    <text x="96" y="206" fill="#e3b341" font-size="14" font-weight="600">Long-term Summary Memory</text>
    <text x="96" y="225" fill="#8b949e" font-size="11.5">.claude/memory/insights.md</text>
    <text x="96" y="245" fill="#c9d1d9" font-size="12">Distilled patterns, confidence-scored insights (0.0 - 1.0)</text>

    <!-- Confidence score animation -->
    <rect x="470" y="200" width="90" height="6" rx="3" fill="#21262d"/>
    <rect x="470" y="200" width="0" height="6" rx="3" fill="url(#layer3)">
      <animate attributeName="width" from="0" to="65" dur="1.5s" begin="1.5s" fill="freeze"/>
    </rect>
    <text x="515" y="223" text-anchor="middle" fill="#484f58" font-size="10">confidence</text>

    <!-- Decay indicator -->
    <text x="540" y="245" text-anchor="end" fill="#484f58" font-size="10">decay -0.05/session</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 2: Working Memory                         -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.8s" fill="freeze"/>

    <rect x="40" y="282" width="540" height="90" rx="8" fill="#1a1a2e" stroke="url(#layer2)" stroke-width="1.5"/>
    <rect x="40" y="282" width="5" height="90" rx="2.5" fill="url(#layer2)"/>

    <circle cx="72" cy="307" r="14" fill="#2ea043" opacity="0.15"/>
    <text x="72" y="312" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">2</text>

    <text x="96" y="308" fill="#3fb950" font-size="14" font-weight="600">Working Memory</text>
    <text x="96" y="327" fill="#8b949e" font-size="11.5">MEMORY.md + .claude/memory/ topic files</text>
    <text x="96" y="347" fill="#c9d1d9" font-size="12">Active projects, recent changes, priorities, preferences</text>

    <!-- File icons animated -->
    <g transform="translate(480, 300)">
      <rect x="0" y="0" width="22" height="28" rx="3" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="25" y="0" width="22" height="28" rx="3" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="50" y="0" width="22" height="28" rx="3" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" begin="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="540" y="347" text-anchor="end" fill="#484f58" font-size="10">on significant actions</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 1: Session Memory                         -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.1s" fill="freeze"/>

    <rect x="40" y="384" width="540" height="90" rx="8" fill="#1a1a2e" stroke="url(#layer1)" stroke-width="1.5"/>
    <rect x="40" y="384" width="5" height="90" rx="2.5" fill="url(#layer1)"/>

    <circle cx="72" cy="409" r="14" fill="#1f6feb" opacity="0.15"/>
    <text x="72" y="414" text-anchor="middle" fill="#388bfd" font-size="14" font-weight="700">1</text>

    <text x="96" y="410" fill="#388bfd" font-size="14" font-weight="600">Session Memory</text>
    <text x="96" y="429" fill="#8b949e" font-size="11.5">Current conversation context</text>
    <text x="96" y="449" fill="#c9d1d9" font-size="12">Automatic, no persistence needed -- lives in context window</text>

    <!-- Streaming dots animation -->
    <g transform="translate(490, 420)">
      <circle cx="0" cy="0" r="3" fill="#388bfd" opacity="0.3">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="15" cy="0" r="3" fill="#388bfd" opacity="0.3">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="0" r="3" fill="#388bfd" opacity="0.3">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="540" y="449" text-anchor="end" fill="#484f58" font-size="10">continuous</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Data flow arrows (animated)                     -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Arrow L4 -> L3 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
    <line x1="310" y1="168" x2="310" y2="180" stroke="#484f58" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="310" cy="174" r="2" fill="#8b949e">
      <animate attributeName="cy" values="168;180;168" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow L3 -> L2 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.7s" fill="freeze"/>
    <line x1="310" y1="270" x2="310" y2="282" stroke="#484f58" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="310" cy="276" r="2" fill="#8b949e">
      <animate attributeName="cy" values="270;282;270" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow L2 -> L1 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.9s" fill="freeze"/>
    <line x1="310" y1="372" x2="310" y2="384" stroke="#484f58" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="310" cy="378" r="2" fill="#8b949e">
      <animate attributeName="cy" values="372;384;372" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Footer -->
  <text x="310" y="500" text-anchor="middle" fill="#484f58" font-size="10">Firstbrain Memory Architecture -- persistence increases upward</text>
</svg>
