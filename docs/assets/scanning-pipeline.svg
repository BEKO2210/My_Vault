<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Node gradients -->
    <linearGradient id="src" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#1a5cc8"/>
    </linearGradient>
    <linearGradient id="proc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8957e5"/>
      <stop offset="100%" stop-color="#6e40c9"/>
    </linearGradient>
    <linearGradient id="out" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="emb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#b08800"/>
    </linearGradient>

    <!-- Animated flow particle -->
    <circle id="particle" r="3"/>

    <!-- Glow filter -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" rx="12" fill="url(#sbg)"/>
  <rect width="720" height="480" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="600">Scanning Pipeline</text>
  <text x="360" y="56" text-anchor="middle" fill="#8b949e" font-size="12">Incremental indexing with SHA-256 change detection</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SOURCE: Markdown Files                          -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>

    <!-- File stack -->
    <rect x="52" y="130" width="96" height="120" rx="6" fill="#21262d" stroke="#388bfd" stroke-width="1.2" opacity="0.3"/>
    <rect x="46" y="124" width="96" height="120" rx="6" fill="#21262d" stroke="#388bfd" stroke-width="1.2" opacity="0.5"/>
    <rect x="40" y="118" width="96" height="120" rx="6" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>

    <!-- .md lines -->
    <line x1="56" y1="145" x2="112" y2="145" stroke="#388bfd" stroke-width="2" opacity="0.6"/>
    <line x1="56" y1="158" x2="104" y2="158" stroke="#388bfd" stroke-width="2" opacity="0.4"/>
    <line x1="56" y1="171" x2="116" y2="171" stroke="#388bfd" stroke-width="2" opacity="0.3"/>
    <line x1="56" y1="184" x2="96" y2="184" stroke="#388bfd" stroke-width="2" opacity="0.2"/>
    <line x1="56" y1="197" x2="108" y2="197" stroke="#388bfd" stroke-width="2" opacity="0.15"/>
    <line x1="56" y1="210" x2="100" y2="210" stroke="#388bfd" stroke-width="2" opacity="0.1"/>

    <!-- Label -->
    <text x="88" y="264" text-anchor="middle" fill="#388bfd" font-size="13" font-weight="600">Markdown</text>
    <text x="88" y="280" text-anchor="middle" fill="#388bfd" font-size="13" font-weight="600">Files</text>
    <text x="88" y="298" text-anchor="middle" fill="#484f58" font-size="10">*.md</text>

    <!-- Count badge -->
    <rect x="110" y="112" width="32" height="18" rx="9" fill="#388bfd" opacity="0.15"/>
    <text x="126" y="125" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="600">N</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PARSER NODE                                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>

    <!-- Glow backdrop -->
    <rect x="196" y="148" width="120" height="80" rx="10" fill="#8957e5" opacity="0.06" filter="url(#softGlow)"/>
    <!-- Node -->
    <rect x="196" y="148" width="120" height="80" rx="10" fill="#161b22" stroke="url(#proc)" stroke-width="1.5"/>
    <!-- Icon: curly braces -->
    <text x="256" y="183" text-anchor="middle" fill="#a371f7" font-size="22" font-weight="300">{ }</text>
    <!-- Label -->
    <text x="256" y="206" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">parser.cjs</text>

    <!-- Processing indicator -->
    <rect x="216" y="214" width="80" height="3" rx="1.5" fill="#21262d"/>
    <rect x="216" y="214" width="0" height="3" rx="1.5" fill="#8957e5">
      <animate attributeName="width" values="0;80;0" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SCANNER NODE                                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>

    <rect x="376" y="148" width="120" height="80" rx="10" fill="#8957e5" opacity="0.06" filter="url(#softGlow)"/>
    <rect x="376" y="148" width="120" height="80" rx="10" fill="#161b22" stroke="url(#proc)" stroke-width="1.5"/>
    <!-- Icon: magnifying glass -->
    <circle cx="430" cy="177" r="9" fill="none" stroke="#a371f7" stroke-width="2"/>
    <line x1="437" y1="184" x2="444" y2="191" stroke="#a371f7" stroke-width="2" stroke-linecap="round"/>
    <!-- SHA badge -->
    <text x="462" y="180" fill="#484f58" font-size="8">SHA-256</text>
    <!-- Label -->
    <text x="436" y="206" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">scanner.cjs</text>

    <!-- Scan sweep animation -->
    <rect x="396" y="214" width="80" height="3" rx="1.5" fill="#21262d"/>
    <rect x="396" y="214" width="0" height="3" rx="1.5" fill="#8957e5">
      <animate attributeName="width" values="0;80;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- OUTPUT: vault-index.json                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>

    <rect x="556" y="90" width="124" height="58" rx="8" fill="#161b22" stroke="url(#out)" stroke-width="1.5"/>
    <text x="618" y="116" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">vault-index</text>
    <text x="618" y="134" text-anchor="middle" fill="#484f58" font-size="10">.json</text>

    <!-- Pulsing indicator -->
    <circle cx="668" cy="100" r="4" fill="#2ea043" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="668" cy="100" r="2" fill="#3fb950"/>
  </g>

  <!-- OUTPUT: link-map.json -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.3s" fill="freeze"/>

    <rect x="556" y="162" width="124" height="58" rx="8" fill="#161b22" stroke="url(#out)" stroke-width="1.5"/>
    <text x="618" y="188" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">link-map</text>
    <text x="618" y="206" text-anchor="middle" fill="#484f58" font-size="10">.json</text>

    <circle cx="668" cy="172" r="4" fill="#2ea043" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="668" cy="172" r="2" fill="#3fb950"/>
  </g>

  <!-- OUTPUT: tag-index.json -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <rect x="556" y="234" width="124" height="58" rx="8" fill="#161b22" stroke="url(#out)" stroke-width="1.5"/>
    <text x="618" y="260" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">tag-index</text>
    <text x="618" y="278" text-anchor="middle" fill="#484f58" font-size="10">.json</text>

    <circle cx="668" cy="244" r="4" fill="#2ea043" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="668" cy="244" r="2" fill="#3fb950"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- EMBEDDER NODE                                   -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.7s" fill="freeze"/>

    <rect x="376" y="340" width="120" height="80" rx="10" fill="#d29922" opacity="0.06" filter="url(#softGlow)"/>
    <rect x="376" y="340" width="120" height="80" rx="10" fill="#161b22" stroke="url(#emb)" stroke-width="1.5"/>
    <!-- Icon: vector brackets -->
    <text x="436" y="374" text-anchor="middle" fill="#e3b341" font-size="16" font-weight="300">[0.82, ...]</text>
    <!-- Label -->
    <text x="436" y="398" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">embedder.cjs</text>

    <!-- Optional badge -->
    <rect x="462" y="333" width="48" height="16" rx="8" fill="#d29922" opacity="0.15"/>
    <text x="486" y="344" text-anchor="middle" fill="#e3b341" font-size="9" font-weight="600">optional</text>
  </g>

  <!-- OUTPUT: embeddings.db -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.9s" fill="freeze"/>

    <rect x="556" y="348" width="124" height="64" rx="8" fill="#161b22" stroke="url(#emb)" stroke-width="1.5"/>
    <!-- DB icon -->
    <ellipse cx="618" cy="367" rx="16" ry="6" fill="none" stroke="#e3b341" stroke-width="1.2"/>
    <line x1="602" y1="367" x2="602" y2="380" stroke="#e3b341" stroke-width="1.2"/>
    <line x1="634" y1="367" x2="634" y2="380" stroke="#e3b341" stroke-width="1.2"/>
    <ellipse cx="618" cy="380" rx="16" ry="6" fill="none" stroke="#e3b341" stroke-width="1.2"/>
    <text x="618" y="404" text-anchor="middle" fill="#484f58" font-size="10">embeddings.db</text>

    <circle cx="668" cy="356" r="4" fill="#d29922" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="668" cy="356" r="2" fill="#e3b341"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ANIMATED CONNECTION LINES                       -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Files -> Parser -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
    <line x1="136" y1="188" x2="196" y2="188" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="192,184 200,188 192,192" fill="#8b949e"/>
    <!-- Flow particle -->
    <circle r="3" fill="#388bfd">
      <animate attributeName="cx" values="140;192" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="188;188" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Parser -> Scanner -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
    <line x1="316" y1="188" x2="376" y2="188" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="372,184 380,188 372,192" fill="#8b949e"/>
    <circle r="3" fill="#a371f7">
      <animate attributeName="cx" values="320;372" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="188;188" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scanner -> vault-index -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/>
    <path d="M496,172 L526,172 L526,119 L556,119" fill="none" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="552,115 560,119 552,123" fill="#8b949e"/>
    <circle r="2.5" fill="#3fb950">
      <animate attributeName="cx" values="496;526;526;552" dur="2s" repeatCount="indefinite" keyTimes="0;0.3;0.7;1"/>
      <animate attributeName="cy" values="172;172;119;119" dur="2s" repeatCount="indefinite" keyTimes="0;0.3;0.7;1"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scanner -> link-map -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.4s" fill="freeze"/>
    <line x1="496" y1="191" x2="556" y2="191" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="552,187 560,191 552,195" fill="#8b949e"/>
    <circle r="2.5" fill="#3fb950">
      <animate attributeName="cx" values="500;552" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="191;191" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scanner -> tag-index -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
    <path d="M496,204 L526,204 L526,263 L556,263" fill="none" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="552,259 560,263 552,267" fill="#8b949e"/>
    <circle r="2.5" fill="#3fb950">
      <animate attributeName="cx" values="496;526;526;552" dur="2s" begin="0.6s" repeatCount="indefinite" keyTimes="0;0.3;0.7;1"/>
      <animate attributeName="cy" values="204;204;263;263" dur="2s" repeatCount="indefinite" keyTimes="0;0.3;0.7;1"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scanner -> Embedder (vertical) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
    <line x1="436" y1="228" x2="436" y2="340" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>
    <polygon points="432,336 436,344 440,336" fill="#8b949e"/>
    <circle r="2.5" fill="#e3b341">
      <animate attributeName="cy" values="232;336" dur="2s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="436;436" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Embedder -> embeddings.db -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
    <line x1="496" y1="380" x2="556" y2="380" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="552,376 560,380 552,384" fill="#8b949e"/>
    <circle r="2.5" fill="#e3b341">
      <animate attributeName="cx" values="500;552" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="380;380" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PERFORMANCE STATS BAR                           -->
  <!-- ═══════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.2s" fill="freeze"/>

    <rect x="40" y="440" width="640" height="28" rx="6" fill="#21262d"/>

    <text x="60" y="459" fill="#8b949e" font-size="10">
      <tspan fill="#3fb950" font-weight="600">~15ms</tspan> full scan
    </text>
    <text x="180" y="459" fill="#8b949e" font-size="10">
      <tspan fill="#3fb950" font-weight="600">~5ms</tspan> incremental
    </text>
    <text x="310" y="459" fill="#8b949e" font-size="10">
      <tspan fill="#388bfd" font-weight="600">SHA-256</tspan> change detection
    </text>
    <text x="480" y="459" fill="#8b949e" font-size="10">
      <tspan fill="#a371f7" font-weight="600">0</tspan> external dependencies
    </text>
    <text x="620" y="459" fill="#8b949e" font-size="10">
      <tspan fill="#e3b341" font-weight="600">local</tspan> embeddings
    </text>
  </g>
</svg>
