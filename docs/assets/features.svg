<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8957e5"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
    <linearGradient id="accent5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#da3633"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
    <filter id="fglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" rx="12" fill="url(#fbg)"/>
  <rect width="780" height="520" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="38" text-anchor="middle" fill="#f0f6fc" font-size="20" font-weight="700">Features</text>
  <text x="390" y="56" text-anchor="middle" fill="#8b949e" font-size="12">Everything you need for an AI-native second brain</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 1                                      -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Card 1: 15 Skills -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.2s" fill="freeze"/>
    <rect x="30" y="80" width="230" height="120" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="1.2"/>
    <rect x="30" y="80" width="230" height="4" rx="2" fill="url(#accent1)"/>
    <!-- Icon: command prompt -->
    <rect x="50" y="100" width="28" height="20" rx="4" fill="#8957e5" opacity="0.15"/>
    <text x="64" y="115" text-anchor="middle" fill="#a371f7" font-size="13" font-weight="700">/</text>
    <text x="88" y="114" fill="#f0f6fc" font-size="14" font-weight="600">15 Skills</text>
    <text x="50" y="138" fill="#8b949e" font-size="11">/create /daily /connect /health</text>
    <text x="50" y="154" fill="#8b949e" font-size="11">/scan /search /memory /briefing</text>
    <text x="50" y="170" fill="#8b949e" font-size="11">/triage /synthesize /maintain</text>
    <text x="50" y="186" fill="#8b949e" font-size="11">/process /watch /graph /propose</text>
    <!-- Animated cursor -->
    <rect x="130" y="178" width="2" height="12" fill="#a371f7">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Card 2: Zero-Dependency -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.35s" fill="freeze"/>
    <rect x="275" y="80" width="230" height="120" rx="10" fill="#161b22" stroke="#1f6feb" stroke-width="1.2"/>
    <rect x="275" y="80" width="230" height="4" rx="2" fill="url(#accent2)"/>
    <!-- Icon: package with 0 -->
    <rect x="295" y="100" width="28" height="20" rx="4" fill="#1f6feb" opacity="0.15"/>
    <text x="309" y="115" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="700">0</text>
    <text x="333" y="114" fill="#f0f6fc" font-size="14" font-weight="600">Zero Dependencies</text>
    <text x="295" y="138" fill="#8b949e" font-size="11">Core runs on Node.js built-ins</text>
    <text x="295" y="154" fill="#8b949e" font-size="11">No npm install for scanning,</text>
    <text x="295" y="170" fill="#8b949e" font-size="11">parsing, or indexing.</text>
    <text x="295" y="186" fill="#484f58" font-size="10">No supply chain risk</text>
  </g>

  <!-- Card 3: Incremental Scanning -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
    <rect x="520" y="80" width="230" height="120" rx="10" fill="#161b22" stroke="#2ea043" stroke-width="1.2"/>
    <rect x="520" y="80" width="230" height="4" rx="2" fill="url(#accent3)"/>
    <rect x="540" y="100" width="28" height="20" rx="4" fill="#2ea043" opacity="0.15"/>
    <!-- Icon: hash -->
    <text x="554" y="115" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">#</text>
    <text x="578" y="114" fill="#f0f6fc" font-size="14" font-weight="600">Incremental Scan</text>
    <text x="540" y="138" fill="#8b949e" font-size="11">SHA-256 content hashing</text>
    <text x="540" y="154" fill="#8b949e" font-size="11">Only re-parses changed files.</text>
    <!-- Speed bar -->
    <rect x="540" y="172" width="120" height="6" rx="3" fill="#21262d"/>
    <rect x="540" y="172" width="0" height="6" rx="3" fill="url(#accent3)">
      <animate attributeName="width" from="0" to="18" dur="0.3s" begin="1.5s" fill="freeze"/>
    </rect>
    <text x="540" y="192" fill="#3fb950" font-size="10" font-weight="600">~15ms full</text>
    <text x="610" y="192" fill="#3fb950" font-size="10" font-weight="600">~5ms incremental</text>
  </g>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 2                                      -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Card 4: Semantic Search -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.65s" fill="freeze"/>
    <rect x="30" y="216" width="230" height="120" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1.2"/>
    <rect x="30" y="216" width="230" height="4" rx="2" fill="url(#accent4)"/>
    <rect x="50" y="236" width="28" height="20" rx="4" fill="#d29922" opacity="0.15"/>
    <!-- Icon: magnifier -->
    <circle cx="62" cy="247" r="6" fill="none" stroke="#e3b341" stroke-width="1.5"/>
    <line x1="66" y1="251" x2="70" y2="255" stroke="#e3b341" stroke-width="1.5" stroke-linecap="round"/>
    <text x="88" y="250" fill="#f0f6fc" font-size="14" font-weight="600">Semantic Search</text>
    <text x="50" y="274" fill="#8b949e" font-size="11">Transformers.js + SQLite</text>
    <text x="50" y="290" fill="#8b949e" font-size="11">100% local embeddings.</text>
    <text x="50" y="306" fill="#8b949e" font-size="11">Your notes never leave your</text>
    <text x="50" y="322" fill="#8b949e" font-size="11">machine.</text>
    <!-- Lock icon -->
    <rect x="226" y="308" width="16" height="12" rx="2" fill="none" stroke="#e3b341" stroke-width="1"/>
    <path d="M229,308 L229,304 A5,5 0 0,1 239,304 L239,308" fill="none" stroke="#e3b341" stroke-width="1"/>
  </g>

  <!-- Card 5: Four-Layer Memory -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
    <rect x="275" y="216" width="230" height="120" rx="10" fill="#161b22" stroke="#da3633" stroke-width="1.2"/>
    <rect x="275" y="216" width="230" height="4" rx="2" fill="url(#accent5)"/>
    <rect x="295" y="236" width="28" height="20" rx="4" fill="#da3633" opacity="0.15"/>
    <!-- Icon: stacked layers -->
    <rect x="302" y="240" width="14" height="3" rx="1" fill="#f85149" opacity="0.4"/>
    <rect x="302" y="244" width="14" height="3" rx="1" fill="#f85149" opacity="0.6"/>
    <rect x="302" y="248" width="14" height="3" rx="1" fill="#f85149" opacity="0.8"/>
    <rect x="302" y="252" width="14" height="3" rx="1" fill="#f85149" opacity="1"/>
    <text x="333" y="250" fill="#f0f6fc" font-size="14" font-weight="600">4-Layer Memory</text>
    <text x="295" y="274" fill="#8b949e" font-size="11">Session, Working, Long-term,</text>
    <text x="295" y="290" fill="#8b949e" font-size="11">Project-specific persistence.</text>
    <text x="295" y="306" fill="#8b949e" font-size="11">Confidence-scored insights</text>
    <text x="295" y="322" fill="#8b949e" font-size="11">with decay and pruning.</text>
    <!-- Pulsing memory indicator -->
    <circle cx="488" cy="316" r="4" fill="#f85149" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="488" cy="316" r="2" fill="#f85149"/>
  </g>

  <!-- Card 6: Proactive Intelligence -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.95s" fill="freeze"/>
    <rect x="520" y="216" width="230" height="120" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="1.2"/>
    <rect x="520" y="216" width="230" height="4" rx="2" fill="url(#accent1)"/>
    <rect x="540" y="236" width="28" height="20" rx="4" fill="#8957e5" opacity="0.15"/>
    <!-- Icon: brain/lightbulb -->
    <circle cx="554" cy="246" r="7" fill="none" stroke="#a371f7" stroke-width="1.3"/>
    <line x1="554" y1="253" x2="554" y2="256" stroke="#a371f7" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="554" cy="246" r="2" fill="#a371f7">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="578" y="250" fill="#f0f6fc" font-size="14" font-weight="600">Proactive Intel</text>
    <text x="540" y="274" fill="#8b949e" font-size="11">Briefings, inbox triage,</text>
    <text x="540" y="290" fill="#8b949e" font-size="11">knowledge synthesis, vault</text>
    <text x="540" y="306" fill="#8b949e" font-size="11">maintenance.</text>
    <text x="540" y="322" fill="#484f58" font-size="10">Claude works for you</text>
  </g>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 3                                      -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Card 7: Governance -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze"/>
    <rect x="30" y="352" width="230" height="120" rx="10" fill="#161b22" stroke="#2ea043" stroke-width="1.2"/>
    <rect x="30" y="352" width="230" height="4" rx="2" fill="url(#accent3)"/>
    <rect x="50" y="372" width="28" height="20" rx="4" fill="#2ea043" opacity="0.15"/>
    <!-- Icon: shield -->
    <path d="M64,376 L58,380 L58,387 Q58,392 64,394 Q70,392 70,387 L70,380 Z" fill="none" stroke="#3fb950" stroke-width="1.3"/>
    <text x="88" y="386" fill="#f0f6fc" font-size="14" font-weight="600">Governance</text>
    <text x="50" y="410" fill="#3fb950" font-size="11" font-weight="600">AUTO</text>
    <text x="88" y="410" fill="#8b949e" font-size="11">Fix links, fill metadata</text>
    <text x="50" y="426" fill="#e3b341" font-size="11" font-weight="600">PROPOSE</text>
    <text x="108" y="426" fill="#8b949e" font-size="11">New folders, MOCs</text>
    <text x="50" y="442" fill="#f85149" font-size="11" font-weight="600">NEVER</text>
    <text x="98" y="442" fill="#8b949e" font-size="11">Delete, merge, rename</text>
  </g>

  <!-- Card 8: 12 Templates -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.25s" fill="freeze"/>
    <rect x="275" y="352" width="230" height="120" rx="10" fill="#161b22" stroke="#1f6feb" stroke-width="1.2"/>
    <rect x="275" y="352" width="230" height="4" rx="2" fill="url(#accent2)"/>
    <rect x="295" y="372" width="28" height="20" rx="4" fill="#1f6feb" opacity="0.15"/>
    <!-- Icon: document -->
    <rect x="302" y="376" width="12" height="14" rx="1.5" fill="none" stroke="#388bfd" stroke-width="1.2"/>
    <line x1="305" y1="381" x2="311" y2="381" stroke="#388bfd" stroke-width="0.8"/>
    <line x1="305" y1="384" x2="311" y2="384" stroke="#388bfd" stroke-width="0.8"/>
    <line x1="305" y1="387" x2="309" y2="387" stroke="#388bfd" stroke-width="0.8"/>
    <text x="333" y="386" fill="#f0f6fc" font-size="14" font-weight="600">12 Templates</text>
    <text x="295" y="410" fill="#8b949e" font-size="11">Project, Area, Resource, Tool,</text>
    <text x="295" y="426" fill="#8b949e" font-size="11">Zettel, Person, Decision,</text>
    <text x="295" y="442" fill="#8b949e" font-size="11">Meeting, Code, Daily, Reviews</text>
    <!-- Template count badge -->
    <rect x="468" y="446" width="24" height="16" rx="8" fill="#388bfd" opacity="0.15"/>
    <text x="480" y="458" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="700">12</text>
  </g>

  <!-- Card 9: Obsidian Compatible -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>
    <rect x="520" y="352" width="230" height="120" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1.2"/>
    <rect x="520" y="352" width="230" height="4" rx="2" fill="url(#accent4)"/>
    <rect x="540" y="372" width="28" height="20" rx="4" fill="#d29922" opacity="0.15"/>
    <!-- Icon: Obsidian diamond -->
    <polygon points="554,376 562,384 554,392 546,384" fill="none" stroke="#e3b341" stroke-width="1.3"/>
    <polygon points="554,380 558,384 554,388 550,384" fill="#e3b341" opacity="0.3"/>
    <text x="578" y="386" fill="#f0f6fc" font-size="14" font-weight="600">100% Obsidian</text>
    <text x="540" y="410" fill="#8b949e" font-size="11">Graph view, search, Properties</text>
    <text x="540" y="426" fill="#8b949e" font-size="11">panel, Dataview queries.</text>
    <text x="540" y="442" fill="#8b949e" font-size="11">Everything just works.</text>
    <!-- Checkmark -->
    <circle cx="730" cy="448" r="8" fill="#2ea043" opacity="0.15"/>
    <polyline points="725,448 728,451 734,445" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom accent line -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/>
    <rect x="30" y="494" width="0" height="2" rx="1" fill="#8957e5" opacity="0.4">
      <animate attributeName="width" from="0" to="720" dur="1s" begin="1.8s" fill="freeze"/>
    </rect>
    <text x="390" y="510" text-anchor="middle" fill="#484f58" font-size="10">Firstbrain v3.0 -- 15 Skills, 12 Templates, 9 Maps of Content</text>
  </g>
</svg>
