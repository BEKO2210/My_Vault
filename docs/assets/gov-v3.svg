<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="auto-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="propose-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
    <linearGradient id="never-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#da3633"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
  </defs>

  <rect width="780" height="540" rx="12" fill="url(#gbg)"/>
  <rect width="780" height="540" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <text x="390" y="36" text-anchor="middle" fill="#f0f6fc" font-size="20" font-weight="700">Governance</text>
  <text x="390" y="54" text-anchor="middle" fill="#8b949e" font-size="12">Four zones control what Claude can do autonomously</text>

  <!-- Legend -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.1s" fill="freeze"/>
    <circle cx="220" cy="76" r="5" fill="#3fb950"/>
    <text x="232" y="80" fill="#3fb950" font-size="11" font-weight="600">AUTO</text>
    <text x="270" y="80" fill="#8b949e" font-size="10">do it, log it</text>

    <circle cx="380" cy="76" r="5" fill="#e3b341"/>
    <text x="392" y="80" fill="#e3b341" font-size="11" font-weight="600">PROPOSE</text>
    <text x="450" y="80" fill="#8b949e" font-size="10">ask first</text>

    <circle cx="540" cy="76" r="5" fill="#f85149"/>
    <text x="552" y="80" fill="#f85149" font-size="11" font-weight="600">NEVER</text>
    <text x="600" y="80" fill="#8b949e" font-size="10">hard boundary</text>
  </g>

  <!-- CONTENT ZONE -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.2s" fill="freeze"/>
    <rect x="30" y="98" width="720" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="98" width="5" height="72" rx="2.5" fill="#388bfd"/>
    <!-- Zone label -->
    <rect x="50" y="108" width="80" height="22" rx="5" fill="#1f6feb" opacity="0.12"/>
    <text x="90" y="123" text-anchor="middle" fill="#388bfd" font-size="11" font-weight="700">Content</text>
    <text x="145" y="123" fill="#484f58" font-size="10">note body text, daily entries</text>
    <!-- AUTO items -->
    <circle cx="55" cy="148" r="4" fill="#3fb950"/>
    <text x="67" y="152" fill="#c9d1d9" font-size="11">Fix broken links</text>
    <circle cx="195" cy="148" r="4" fill="#3fb950"/>
    <text x="207" y="152" fill="#c9d1d9" font-size="11">Fill frontmatter</text>
    <!-- NEVER items -->
    <circle cx="550" cy="148" r="4" fill="#f85149"/>
    <text x="562" y="152" fill="#f85149" font-size="11">Edit body text without request</text>
  </g>

  <!-- STRUCTURE ZONE -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s" fill="freeze"/>
    <rect x="30" y="182" width="720" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="182" width="5" height="72" rx="2.5" fill="#a371f7"/>
    <rect x="50" y="192" width="86" height="22" rx="5" fill="#8957e5" opacity="0.12"/>
    <text x="93" y="207" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="700">Structure</text>
    <text x="150" y="207" fill="#484f58" font-size="10">folders, MOCs, templates</text>
    <circle cx="55" cy="232" r="4" fill="#3fb950"/>
    <text x="67" y="236" fill="#c9d1d9" font-size="11">Add to MOC</text>
    <circle cx="165" cy="232" r="4" fill="#3fb950"/>
    <text x="177" y="236" fill="#c9d1d9" font-size="11">Fix MOC links</text>
    <circle cx="310" cy="232" r="4" fill="#e3b341"/>
    <text x="322" y="236" fill="#c9d1d9" font-size="11">New folders</text>
    <circle cx="420" cy="232" r="4" fill="#e3b341"/>
    <text x="432" y="236" fill="#c9d1d9" font-size="11">New MOCs</text>
    <circle cx="550" cy="232" r="4" fill="#f85149"/>
    <text x="562" y="236" fill="#f85149" font-size="11">Delete vault folders</text>
  </g>

  <!-- SYSTEM ZONE -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.6s" fill="freeze"/>
    <rect x="30" y="266" width="720" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="266" width="5" height="72" rx="2.5" fill="#d29922"/>
    <rect x="50" y="276" width="74" height="22" rx="5" fill="#d29922" opacity="0.12"/>
    <text x="87" y="291" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="700">System</text>
    <text x="140" y="291" fill="#484f58" font-size="10">.claude/, rules, config</text>
    <circle cx="55" cy="316" r="4" fill="#3fb950"/>
    <text x="67" y="320" fill="#c9d1d9" font-size="11">Update memory</text>
    <circle cx="195" cy="316" r="4" fill="#3fb950"/>
    <text x="207" y="320" fill="#c9d1d9" font-size="11">Append changelog</text>
    <circle cx="360" cy="316" r="4" fill="#e3b341"/>
    <text x="372" y="320" fill="#c9d1d9" font-size="11">Modify CLAUDE.md</text>
    <circle cx="550" cy="316" r="4" fill="#f85149"/>
    <text x="562" y="320" fill="#f85149" font-size="11">Delete system files</text>
  </g>

  <!-- WORKSPACE ZONE -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
    <rect x="30" y="350" width="720" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="350" width="5" height="72" rx="2.5" fill="#3fb950"/>
    <rect x="50" y="360" width="92" height="22" rx="5" fill="#2ea043" opacity="0.12"/>
    <text x="96" y="375" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">Workspace</text>
    <text x="157" y="375" fill="#484f58" font-size="10">code in workspace/</text>
    <circle cx="55" cy="400" r="4" fill="#3fb950"/>
    <text x="67" y="404" fill="#c9d1d9" font-size="11">Create, code, commit</text>
    <circle cx="220" cy="400" r="4" fill="#3fb950"/>
    <text x="232" y="404" fill="#c9d1d9" font-size="11">Push, build, test</text>
    <circle cx="370" cy="400" r="4" fill="#e3b341"/>
    <text x="382" y="404" fill="#c9d1d9" font-size="11">Delete, force-push, deploy</text>
    <circle cx="580" cy="400" r="4" fill="#f85149"/>
    <text x="592" y="404" fill="#f85149" font-size="11">Expose secrets</text>
  </g>

  <!-- SECURITY SECTION -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <rect x="30" y="440" width="720" height="78" rx="8" fill="#da3633" opacity="0.04"/>
    <rect x="30" y="440" width="720" height="78" rx="8" fill="none" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

    <!-- Shield icon -->
    <path d="M72,456 L60,462 L60,474 Q60,482 72,486 Q84,482 84,474 L84,462 Z" fill="none" stroke="#f85149" stroke-width="1.5"/>
    <polyline points="66,472 70,476 78,466" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="96" y="468" fill="#f85149" font-size="13" font-weight="700">Prompt Injection Defense</text>

    <!-- Defense items -->
    <text x="96" y="486" fill="#8b949e" font-size="10.5">Vault notes are DATA, not instructions</text>
    <text x="320" y="486" fill="#484f58" font-size="10">|</text>
    <text x="332" y="486" fill="#8b949e" font-size="10.5">No file can escalate permissions</text>
    <text x="536" y="486" fill="#484f58" font-size="10">|</text>
    <text x="548" y="486" fill="#8b949e" font-size="10.5">Shell scoped to workspace/</text>

    <text x="96" y="504" fill="#8b949e" font-size="10.5">Injection patterns auto-detected</text>
    <text x="310" y="504" fill="#484f58" font-size="10">|</text>
    <text x="322" y="504" fill="#8b949e" font-size="10.5">Secrets stripped before archive</text>
    <text x="520" y="504" fill="#484f58" font-size="10">|</text>
    <text x="532" y="504" fill="#8b949e" font-size="10.5">Watch: max 10/cycle, no loops</text>
  </g>

  <!-- Footer -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.4s" fill="freeze"/>
    <text x="390" y="534" text-anchor="middle" fill="#484f58" font-size="10">Only CLAUDE.md and .claude/rules/ define behavior. Everything else is user data.</text>
  </g>
</svg>
