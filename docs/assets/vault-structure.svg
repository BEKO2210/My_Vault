    <rect x="46" y="276" width="52" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="72" y="289" text-anchor="middle" fill="#a371f7" font-size="8">/create</text>
    <rect x="104" y="276" width="42" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="125" y="289" text-anchor="middle" fill="#a371f7" font-size="8">/daily</text>
    <rect x="152" y="276" width="42" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="173" y="289" text-anchor="middle" fill="#a371f7" font-size="8">/scan</text>
    <rect x="200" y="276" width="54" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="227" y="289" text-anchor="middle" fill="#a371f7" font-size="8">/search</text>
    <rect x="260" y="276" width="54" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="287" y="289" text-anchor="middle" fill="#a371f7" font-size="8">/health</text>
    <rect x="320" y="276" width="48" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="344" y="289" text-anchor="middle" fill="#a371f7" font-size="8">/triage</text>

    <rect x="46" y="300" width="60" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="76" y="313" text-anchor="middle" fill="#a371f7" font-size="8">/briefing</text>
    <rect x="112" y="300" width="62" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="143" y="313" text-anchor="middle" fill="#a371f7" font-size="8">/connect</text>
    <rect x="180" y="300" width="72" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="216" y="313" text-anchor="middle" fill="#a371f7" font-size="8">/synthesize</text>
    <rect x="258" y="300" width="62" height="18" rx="9" fill="#8957e5" opacity="0.1"/>
    <text x="289" y="313" text-anchor="middle" fill="#a371f7" font-size="8">/maintain</text>
    <rect x="46" y="324" width="60" height="18" rx="9" fill="#2ea043" opacity="0.1"/>
    <text x="76" y="337" text-anchor="middle" fill="#3fb950" font-size="8">/process</text>
    <rect x="112" y="324" width="52" height="18" rx="9" fill="#2ea043" opacity="0.1"/>
    <text x="138" y="337" text-anchor="middle" fill="#3fb950" font-size="8">/watch</text>
    <rect x="170" y="324" width="62" height="18" rx="9" fill="#1f6feb" opacity="0.1"/>
    <text x="201" y="337" text-anchor="middle" fill="#388bfd" font-size="8">/memory</text>

    <!-- System config -->
    <rect x="400" y="240" width="350" height="100" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
    <rect x="400" y="240" width="350" height="3" rx="1.5" fill="#e3b341"/>
    <text x="420" y="264" fill="#e3b341" font-size="12" font-weight="700">.claude/</text>
    <text x="477" y="264" fill="#484f58" font-size="10">system config</text>

    <!-- Sub-items -->
    <rect x="416" y="278" width="86" height="20" rx="4" fill="#21262d"/>
    <text x="459" y="292" text-anchor="middle" fill="#8b949e" font-size="9">memory/ (4 layers)</text>
    <rect x="510" y="278" width="68" height="20" rx="4" fill="#21262d"/>
    <text x="544" y="292" text-anchor="middle" fill="#8b949e" font-size="9">rules/ (5 files)</text>
    <rect x="586" y="278" width="68" height="20" rx="4" fill="#21262d"/>
    <text x="620" y="292" text-anchor="middle" fill="#8b949e" font-size="9">indexes/</text>
    <rect x="662" y="278" width="74" height="20" rx="4" fill="#21262d"/>
    <text x="699" y="292" text-anchor="middle" fill="#8b949e" font-size="9">changelog.md</text>

    <text x="420" y="322" fill="#c9d1d9" font-size="11" font-weight="600">CLAUDE.md</text>
    <text x="506" y="322" fill="#484f58" font-size="10">loaded on startup</text>

    <!-- Shield -->
    <path d="M710,310 L700,315 L700,324 Q700,330 710,333 Q720,330 720,324 L720,315 Z" fill="none" stroke="#f85149" stroke-width="1.2"/>
    <text x="710" y="326" text-anchor="middle" fill="#f85149" font-size="7" font-weight="700">!</text>
  </g>

  <!-- WORKSPACE -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
    <rect x="30" y="360" width="720" height="3" rx="1.5" fill="#3fb950" opacity="0.2"/>
    <text x="390" y="380" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">EXECUTION LAYER</text>

    <rect x="30" y="392" width="720" height="56" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
    <rect x="30" y="392" width="720" height="3" rx="1.5" fill="#3fb950"/>

    <text x="60" y="416" fill="#3fb950" font-size="12" font-weight="700">workspace/</text>
    <text x="148" y="416" fill="#484f58" font-size="10">actual code projects</text>

    <!-- Project folders -->
    <rect x="300" y="404" width="90" height="28" rx="6" fill="#21262d"/>
    <text x="312" y="422" fill="#388bfd" font-size="10">my-app/</text>

    <rect x="400" y="404" width="120" height="28" rx="6" fill="#21262d"/>
    <text x="412" y="422" fill="#388bfd" font-size="10">another-project/</text>

    <rect x="530" y="404" width="60" height="28" rx="6" fill="#21262d"/>
    <text x="542" y="422" fill="#388bfd" font-size="10">api/</text>

    <rect x="600" y="404" width="36" height="28" rx="6" fill="#21262d"/>
    <text x="612" y="422" fill="#484f58" font-size="10">...</text>

    <!-- Git badges -->
    <text x="662" y="422" fill="#484f58" font-size="9">each has own</text>
    <rect x="718" y="410" width="24" height="14" rx="7" fill="#3fb950" opacity="0.15"/>
    <text x="730" y="420" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="600">git</text>
  </g>

  <!-- LAUNCHERS -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
    <rect x="30" y="464" width="720" height="36" rx="6" fill="#21262d"/>
    <text x="60" y="486" fill="#8b949e" font-size="10">Launchers:</text>
    <rect x="126" y="474" width="64" height="18" rx="9" fill="#2ea043" opacity="0.1"/>
    <text x="158" y="487" text-anchor="middle" fill="#3fb950" font-size="9">start.sh</text>
    <rect x="198" y="474" width="64" height="18" rx="9" fill="#388bfd" opacity="0.1"/>
    <text x="230" y="487" text-anchor="middle" fill="#388bfd" font-size="9">start.bat</text>
    <rect x="270" y="474" width="88" height="18" rx="9" fill="#a371f7" opacity="0.1"/>
    <text x="314" y="487" text-anchor="middle" fill="#a371f7" font-size="9">start.command</text>
    <text x="390" y="487" fill="#484f58" font-size="10">|</text>
    <text x="410" y="487" fill="#8b949e" font-size="10">Core:</text>
    <text x="445" y="487" fill="#c9d1d9" font-size="10">Home.md</text>
    <text x="502" y="487" fill="#c9d1d9" font-size="10">START HERE.md</text>
    <text x="592" y="487" fill="#c9d1d9" font-size="10">Workflow Guide.md</text>
  </g>

  <!-- Footer -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
    <text x="390" y="514" text-anchor="middle" fill="#484f58" font-size="10">Three layers: Knowledge (PARA) + Intelligence (AI) + Execution (workspace)</text>
  </g>
</svg>
