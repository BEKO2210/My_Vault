  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>
    <rect x="30" y="208" width="720" height="3" rx="1.5" fill="#a371f7" opacity="0.2"/>
    <text x="390" y="228" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="700">AI LAYER</text>

    <!-- Skills -->
    <rect x="30" y="240" width="350" height="100" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="1"/>
    <rect x="30" y="240" width="350" height="3" rx="1.5" fill="#8957e5"/>
    <text x="50" y="264" fill="#a371f7" font-size="12" font-weight="700">.agents/skills/</text>
