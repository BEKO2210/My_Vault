<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="780" height="520" rx="12" fill="url(#vbg)"/>
  <rect width="780" height="520" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <text x="390" y="36" text-anchor="middle" fill="#f0f6fc" font-size="20" font-weight="700">Vault Structure</text>
  <text x="390" y="54" text-anchor="middle" fill="#8b949e" font-size="12">PARA method + AI layer + execution workspace</text>

  <!-- PARA FOLDERS -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <!-- Inbox -->
    <rect x="30" y="74" width="170" height="56" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.2"/>
    <rect x="36" y="82" width="4" height="40" rx="2" fill="#388bfd"/>
    <text x="52" y="97" fill="#388bfd" font-size="12" font-weight="700">00 - Inbox</text>
    <text x="52" y="116" fill="#8b949e" font-size="10">Actions, prompts, daily notes</text>
    <!-- Pulsing dot for incoming -->
    <circle cx="186" cy="86" r="4" fill="#388bfd" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="186" cy="86" r="2" fill="#388bfd"/>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.3s" fill="freeze"/>
    <!-- Projects -->
    <rect x="210" y="74" width="170" height="56" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.2"/>
    <rect x="216" y="82" width="4" height="40" rx="2" fill="#a371f7"/>
    <text x="232" y="97" fill="#a371f7" font-size="12" font-weight="700">01 - Projects</text>
    <text x="232" y="116" fill="#8b949e" font-size="10">Plans, status, decisions, logs</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.4s" fill="freeze"/>
    <!-- Areas -->
    <rect x="390" y="74" width="170" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.2"/>
    <rect x="396" y="82" width="4" height="40" rx="2" fill="#3fb950"/>
    <text x="412" y="97" fill="#3fb950" font-size="12" font-weight="700">02 - Areas</text>
    <text x="412" y="116" fill="#8b949e" font-size="10">Life areas, ongoing</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
    <!-- Resources -->
    <rect x="570" y="74" width="180" height="56" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.2"/>
    <rect x="576" y="82" width="4" height="40" rx="2" fill="#e3b341"/>
    <text x="592" y="97" fill="#e3b341" font-size="12" font-weight="700">03 - Resources</text>
    <text x="592" y="116" fill="#8b949e" font-size="10">Tools, zettel, snippets, people</text>
  </g>

  <!-- SECOND ROW: Archive, Templates, MOCs, Extras -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
    <rect x="30" y="142" width="170" height="46" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1"/>
    <text x="50" y="170" fill="#484f58" font-size="11" font-weight="600">04 - Archive</text>
    <text x="145" y="170" fill="#30363d" font-size="9">completed</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.65s" fill="freeze"/>
    <rect x="210" y="142" width="170" height="46" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1"/>
    <rect x="352" y="146" width="20" height="12" rx="6" fill="#f85149" opacity="0.15"/>
    <text x="362" y="155" text-anchor="middle" fill="#f85149" font-size="7" font-weight="600">RO</text>
    <text x="230" y="170" fill="#f85149" font-size="11" font-weight="600">05 - Templates</text>
    <text x="320" y="170" fill="#30363d" font-size="9">12 types</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
    <rect x="390" y="142" width="170" height="46" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1"/>
    <text x="410" y="170" fill="#a371f7" font-size="11" font-weight="600">06 - Atlas/MOCs</text>
    <text x="520" y="170" fill="#30363d" font-size="9">9 hubs</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.75s" fill="freeze"/>
    <rect x="570" y="142" width="180" height="46" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1"/>
    <text x="590" y="170" fill="#484f58" font-size="11" font-weight="600">07 - Extras</text>
    <text x="670" y="170" fill="#30363d" font-size="9">attachments</text>
  </g>

